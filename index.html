<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="ad.size" content="width=390,height=700">
    <title>Nissan Puerto Rico - AI Co-Pilot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        nissan: {
                            red: "#C3002F",
                            black: "#0A0A0A",
                            dark: "#111111",
                            slate: "#1A1A1A"
                        }
                    },
                    boxShadow: {
                        "nissan-red": "0 0 18px -4px rgba(195, 0, 47, 0.55)"
                    },
                    fontFamily: {
                        sans: ["Inter", "ui-sans-serif", "system-ui", "-apple-system", "Segoe UI", "Roboto", "Arial", "sans-serif"]
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .glass-panel {
                @apply bg-black/55 backdrop-blur-lg border border-white/10;
            }
            .video-overlay {
                background: linear-gradient(180deg, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.78) 35%, rgba(0,0,0,0.92) 100%);
            }
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: "Inter", sans-serif;
            background-color: #f2f2f2;
            color: #e5e7eb;
            display: flex;
            align-items: stretch;
            box-sizing: border-box;
        }

        #ad-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
            align-items: flex-start;
        }

        #ad-panel {
            flex-shrink: 0;
            width: 390px;
            padding: 16px;
            box-sizing: border-box;
        }

        #content-panel {
            flex: 1;
            padding: 20px 24px;
            background: #f2f2f2;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .fake-content-block {
            background: #d8d8d8;
            border-radius: 6px;
        }

        /* En móvil: solo se ve el ad, sin panel de contenido */
        @media (max-width: 600px) {
            #ad-panel {
                width: 100%;
                padding: 12px;
            }
            #content-panel {
                display: none;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="ad-wrapper">
  <div id="ad-panel">
    <main class="relative w-full h-[700px] bg-black rounded-[24px] overflow-hidden border border-white/10" style="box-shadow: 0 8px 40px rgba(0,0,0,0.30), 0 2px 12px rgba(0,0,0,0.15);">
        <video id="bgVideo" autoplay loop muted playsinline class="absolute top-0 left-0 w-full h-full object-cover z-0">
            <source src="./Puerto_Rico_Coastal_Drive_Video.mp4" type="video/mp4">
        </video>

        <header class="relative z-20 flex items-center gap-4 px-5 py-4 border-b border-white/10" style="background: linear-gradient(120deg, #C3002F 0%, #8B0020 55%, #1a0005 100%);">
            <div class="h-16 w-16 rounded-xl overflow-hidden flex-shrink-0 shadow-lg border border-white/20 bg-nissan-red flex items-center justify-center">
                <img src="./nissan-logo.png" alt="Nissan" class="h-full w-full object-cover" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=\'text-white font-extrabold text-sm tracking-wide\'>NIS</span>'">
            </div>
            <div class="flex-1">
                <h1 class="text-[17px] font-extrabold uppercase tracking-widest text-white leading-tight">Nissan AI Co-Pilot</h1>
                <span class="text-[11px] text-red-200 uppercase tracking-[0.18em] font-semibold">Asistente Inteligente · Puerto Rico</span>
            </div>
            <div class="flex flex-col items-center gap-1">
                <div class="h-3 w-3 rounded-full bg-white animate-pulse"></div>
                <span class="text-[9px] text-red-200 uppercase tracking-wide font-bold">LIVE</span>
            </div>
        </header>

        <section id="chatSection" class="relative z-20 px-3 py-4 overflow-y-auto scrollbar-hide" style="height: calc(100% - 80px - 88px); padding-bottom: 145px;">
            <div id="chatMessages" class="space-y-4"></div>
        </section>

        <div class="absolute bottom-0 left-0 right-0 p-4 bg-black/65 backdrop-blur-md border-t border-white/10 flex items-center gap-3 z-20">
            <input
                type="text"
                id="chatInput"
                placeholder="Escribe tu mensaje..."
                class="flex-1 bg-white/95 rounded-full h-12 px-4 border border-white/20 text-black text-sm focus:outline-none focus:ring-2 focus:ring-nissan-red/70 focus:border-nissan-red"
                autocomplete="off"
            >
            <button
                id="sendButton"
                class="h-12 w-12 rounded-full bg-nissan-red flex items-center justify-center shadow-nissan-red hover:bg-[#a30027] transition-colors cursor-pointer"
                onclick="sendMessage()"
                aria-label="Enviar mensaje"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white rotate-90" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </div>
    </main>
  </div><!-- /ad-panel -->

  <div id="content-panel">
    <!-- Bloque imagen grande -->
    <div class="fake-content-block" style="height: 220px;"></div>
    <!-- Líneas de texto simuladas -->
    <div class="fake-content-block" style="height: 18px; width: 85%;"></div>
    <div class="fake-content-block" style="height: 18px; width: 70%;"></div>
    <div class="fake-content-block" style="height: 18px; width: 90%;"></div>
    <div class="fake-content-block" style="height: 18px; width: 60%;"></div>
    <div class="fake-content-block" style="height: 18px; width: 80%;"></div>
    <div class="fake-content-block" style="height: 18px; width: 55%;"></div>
    <div class="fake-content-block" style="height: 18px; width: 75%;"></div>
    <div class="fake-content-block" style="height: 18px; width: 88%;"></div>
  </div><!-- /content-panel -->
</div><!-- /ad-wrapper -->

    <script>
        const chatMessages = document.getElementById("chatMessages");
        const chatSection = document.getElementById("chatSection");
        const chatInput = document.getElementById("chatInput");
        const sendButton = document.getElementById("sendButton");

        const leadFormState = {
            shown: false,
            submitted: false
        };

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                chatSection.scrollTop = chatSection.scrollHeight;
            });
        }

        function createUserBubble(message) {
            const userMessageDiv = document.createElement("div");
            userMessageDiv.className = "flex justify-end w-full";
            userMessageDiv.innerHTML = `
                <div class="bg-white/95 text-black p-3 rounded-tr-none rounded-2xl max-w-[90%] shadow-lg border border-white/30">
                    <p class="text-sm font-medium leading-snug">${escapeHtml(message)}</p>
                </div>
            `;
            chatMessages.appendChild(userMessageDiv);
        }

        function createBotBubble(message) {
            const aiResponseDiv = document.createElement("div");
            aiResponseDiv.className = "flex items-start gap-2 w-full";
            aiResponseDiv.innerHTML = `
                <div class="flex-shrink-0 h-10 w-10 rounded-full bg-nissan-red/95 p-[2px] shadow-nissan-red">
                    <div class="h-full w-full rounded-full bg-black flex items-center justify-center">
                        <span class="text-[10px] font-bold text-white tracking-wide">NIS</span>
                    </div>
                </div>
                <div class="flex-1 min-w-0">
                    <div class="glass-panel text-white p-3 rounded-tl-none rounded-2xl border-l-2 border-nissan-red">
                        <p class="text-sm leading-snug">${escapeHtml(message)}</p>
                    </div>
                </div>
            `;
            chatMessages.appendChild(aiResponseDiv);
        }

        function submitLead(data) {
            console.log("Lead enviado a CRM (simulado):", data);
        }

        function showLeadForm() {
            if (leadFormState.shown || leadFormState.submitted) {
                return;
            }
            leadFormState.shown = true;

            const formWrapper = document.createElement("div");
            formWrapper.id = "leadFormWrapper";
            formWrapper.className = "w-full";
            formWrapper.innerHTML = `
                <div class="ml-12 glass-panel p-4 rounded-2xl border border-nissan-red/40 shadow-nissan-red">
                    <p class="text-sm text-white font-semibold mb-3">Perfecto. Compárteme tus datos y te contactamos para agendar tu prueba de manejo.</p>
                    <form id="leadForm" class="space-y-3">
                        <div>
                            <label for="leadName" class="block text-xs text-gray-300 mb-1">Nombre completo</label>
                            <input id="leadName" name="name" type="text" required placeholder="Ej. María Pérez"
                                class="w-full h-11 px-3 rounded-xl bg-black/70 border border-white/20 text-white placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-nissan-red/70 focus:border-nissan-red" />
                        </div>
                        <div>
                            <label for="leadPhone" class="block text-xs text-gray-300 mb-1">Teléfono</label>
                            <input id="leadPhone" name="phone" type="tel" required placeholder="Ej. 787-555-1234"
                                class="w-full h-11 px-3 rounded-xl bg-black/70 border border-white/20 text-white placeholder:text-gray-400 focus:outline-none focus:ring-2 focus:ring-nissan-red/70 focus:border-nissan-red" />
                        </div>
                        <button type="submit" class="w-full h-11 rounded-xl bg-nissan-red hover:bg-[#a30027] text-white font-bold tracking-wide transition-colors">
                            ENVIAR DATOS
                        </button>
                    </form>
                </div>
            `;

            chatMessages.appendChild(formWrapper);
            scrollToBottom();

            const leadForm = document.getElementById("leadForm");
            leadForm.addEventListener("submit", function(event) {
                event.preventDefault();

                const name = document.getElementById("leadName").value.trim();
                const phone = document.getElementById("leadPhone").value.trim();

                if (!name || !phone) {
                    createBotBubble("Necesito tu nombre y teléfono para continuar con la solicitud.");
                    scrollToBottom();
                    return;
                }

                submitLead({ name, phone, source: "nissan-ai-copilot-banner" });
                leadFormState.submitted = true;

                const wrapper = document.getElementById("leadFormWrapper");
                if (wrapper) {
                    wrapper.remove();
                }

                createBotBubble(`Gracias, ${name}. Ya recibimos tu información y un asesor Nissan Puerto Rico te llamará pronto para confirmar tu prueba de manejo.`);
                scrollToBottom();
            });
        }

        function handleLeadIntent(userMessage) {
            const normalized = userMessage.toLowerCase();
            const interestKeywords = [
                "interesa", "quiero", "prueba", "manejo", "kicks", "frontier",
                "cotizacion", "cotización", "agendar", "agenda", "test drive", "me gusta"
            ];
            return interestKeywords.some((keyword) => normalized.includes(keyword));
        }

        function generateLeadResponse(userMessage) {
            if (handleLeadIntent(userMessage) && !leadFormState.shown && !leadFormState.submitted) {
                return {
                    message: "Excelente. La nueva Nissan Kicks y la Frontier ya están listas para prueba de manejo. Completa este formulario y te contactamos hoy mismo.",
                    showForm: true
                };
            }

            if (leadFormState.submitted) {
                return {
                    message: "Tu solicitud ya quedó registrada. Si quieres, también puedo ayudarte a elegir entre Nissan Kicks o Frontier según tu estilo de manejo.",
                    showForm: false
                };
            }

            return {
                message: "Puedo ayudarte a agendar tu prueba de manejo de la nueva Nissan Kicks o la Nissan Frontier. Dime cuál te interesa más y te guío.",
                showForm: false
            };
        }

        function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) {
                return;
            }

            createUserBubble(message);
            chatInput.value = "";
            chatInput.disabled = true;
            sendButton.disabled = true;
            scrollToBottom();

            setTimeout(() => {
                const botResponse = generateLeadResponse(message);
                createBotBubble(botResponse.message);

                if (botResponse.showForm) {
                    showLeadForm();
                }

                chatInput.disabled = false;
                sendButton.disabled = false;
                chatInput.focus();
                scrollToBottom();
            }, 450);
        }

        chatInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        window.addEventListener("load", () => {
            createBotBubble("Hola, soy Nissan AI Co-Pilot. Te invito a agendar una prueba de manejo de la nueva Nissan Kicks o la Nissan Frontier. ¿Cuál te gustaría conocer primero?");
            chatInput.focus();
            scrollToBottom();
        });

        document.addEventListener("DOMContentLoaded", function() {
            const video = document.getElementById("bgVideo");
            const playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(() => {
                    // Mantener silencioso si el navegador bloquea autoplay.
                });
            }
        });
    </script>
</body>
</html>
